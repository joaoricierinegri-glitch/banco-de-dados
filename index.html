<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Brasil | Universo Digital</title>
    <style>
        :root {
            --verde-brasil: #009739;
            --amarelo-brasil: #fedd00;
            --azul-espacial: #020617;
        }

        /* CONFIGURAÇÃO DO ESPAÇO */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, var(--azul-espacial) 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* ESTRELAS QUE PISCAM */
        .stars-wrapper {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .stars {
            width: 2px;
            height: 2px;
            background: white;
            position: absolute;
            border-radius: 50%;
            /* Gerando várias estrelas com sombras */
            box-shadow: 15vw 10vh #fff, 35vw 45vh #fff, 70vw 20vh #fff, 10vw 80vh #fff, 
                        90vw 10vh #fff, 50vw 50vh #fff, 80vw 85vh #fff, 25vw 90vh #fff;
            animation: twinkle 5s infinite ease-in-out;
        }

        /* EFEITO DE COMETA (ESTRELA CADENTE) */
        .comet {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 80px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            transform: rotate(45deg);
            animation: shoot 8s infinite ease-in;
            opacity: 0;
        }

        /* NEBULOSA BRASILEIRA */
        .nebula {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 151, 57, 0.15) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
        }

        /* CARTÃO GLASSMORPHISM PREMIUM */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            max-width: 400px;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        .terra {
            font-size: 100px;
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(0, 151, 57, 0.5));
            animation: rotation 15s linear infinite;
            cursor: pointer;
        }

        .bandeiras {
            font-size: 18px;
            letter-spacing: 12px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(135deg, #fff 40%, var(--verde-brasil), var(--amarelo-brasil));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-top: 15px;
        }

        /* BOTÃO COM EFEITO BOUNCE */
        .boton {
            margin-top: 35px;
            padding: 18px 45px;
            background: linear-gradient(45deg, var(--verde-brasil), #00c84b);
            color: white;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 800;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(0, 151, 57, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .boton:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 151, 57, 0.6);
            filter: brightness(1.2);
        }

        /* ANIMAÇÕES */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(1.5deg); }
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes shoot {
            0% { transform: translateX(100vw) translateY(-100vh) rotate(45deg); opacity: 1; }
            15% { transform: translateX(-100vw) translateY(100vh) rotate(45deg); opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars-wrapper">
        <div class="stars"></div>
        <div class="stars" style="animation-delay: -2s; transform: rotate(90deg);"></div>
        <div class="comet"></div>
    </div>

    <div class="nebula"></div>

    <div class="card">
        <span class="terra">🌎</span>
        <div class="bandeiras">🇧🇷 🇧🇷 🇧🇷</div>
        <h1>Olá, Mundo!</h1>
        <p>Criando experiências incríveis com a energia do Brasil e a imensidão do universo.</p>
        <a href="#" class="boton">Explorar Agora</a>
    </div>

</body>
</html>
