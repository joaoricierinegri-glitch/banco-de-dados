<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo Brasil</title>
    <style>
        :root {
            --verde-brasil: #009739;
            --amarelo-brasil: #fedd00;
            --azul-brasil: #012169;
            --dark: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Efecto de luces de fondo */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--verde-brasil);
            filter: blur(150px);
            opacity: 0.2;
            top: 10%;
            left: 10%;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        .terra {
            font-size: 80px;
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0, 151, 57, 0.5));
            animation: rotation 10s linear infinite;
        }

        .bandeiras {
            margin: 15px 0;
            font-size: 24px;
            letter-spacing: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            background: linear-gradient(to right, var(--verde-brasil), var(--amarelo-brasil));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #a0aec0;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .boton {
            margin-top: 25px;
            padding: 15px 35px;
            background: linear-gradient(45deg, var(--verde-brasil), #007a2e);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 151, 57, 0.3);
            border: none;
        }

        .boton:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 151, 57, 0.4);
            filter: brightness(1.2);
        }

        /* Animaciones */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="terra">🌎</span>
        <div class="bandeiras">🇧🇷 🇧🇷 🇧🇷</div>
        <h1>Olá, Mundo!</h1>
        <p>Desenvolvendo o futuro com as cores do Brasil.</p>
        <a href="#" class="boton">Começar Agora</a>
    </div>

</body>
</html>
